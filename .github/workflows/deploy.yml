name: Deploy to VPS

on:
  push:
    branches:
      - web-application-version
  workflow_dispatch:

concurrency:
  group: deploy-web-application-version
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: web-application-version
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: DEPLOY_BRANCH,DEPLOY_PATH,IMAGE_NAME,CONTAINER_NAME,APP_PORT
          script: |
            set -euo pipefail

            cd "$DEPLOY_PATH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            
            docker build -t "$IMAGE_NAME" .

            cd ~/app
            docker compose up -d mysql_fastapi
            docker compose run --rm -e RUN_MIGRATIONS=1 fastapi true
            docker compose up -d fastapi

            docker image prune -f